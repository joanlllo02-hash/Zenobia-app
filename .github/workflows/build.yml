name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Fix gradle.properties for CI
        run: |
          sed -i '/org.gradle.java.home/d' gradle.properties
          sed -i '/org.gradle.caching/d' gradle.properties
          sed -i '/org.gradle.configuration-cache/d' gradle.properties

      - name: Accept licenses & install SDK
        run: |
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/tools/bin/sdkmanager --install "platforms;android-37" 2>&1 || echo "android-37 not available"
          $ANDROID_HOME/tools/bin/sdkmanager --install "build-tools;37.0.0" 2>&1 || echo "build-tools 37 not available"

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleGplayDebug --stacktrace --no-daemon 2>&1 | tee /tmp/gradle.log | tail -200
          exit ${PIPESTATUS[0]}

      - name: Show error context
        if: failure()
        run: |
          grep "^e:" /tmp/gradle.log 2>/dev/null | head -20 | while IFS= read -r line; do echo "::error::$line"; done
          tail -20 /tmp/gradle.log 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: zenobia-debug-apk
          path: '**/*.apk'
