name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Accept licenses & install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager --install "platforms;android-37" "build-tools;37.0.0" "ndk;27.0.12077973" "cmake;3.22.1" 2>&1 | tail -5

      - name: Remove hardcoded JDK path & configure CI
        run: |
          sed -i '/org.gradle.java.home/d' gradle.properties
          echo "org.gradle.caching=false" >> gradle.properties
          echo "org.gradle.configuration-cache=false" >> gradle.properties

      - name: Build Debug APK
        run: ./gradlew assembleGplayDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zenobia-debug-apk
          path: app/build/outputs/apk/gplay/debug/*.apk
