name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Fix gradle.properties for CI
        run: |
          sed -i '/org.gradle.java.home/d' gradle.properties
          sed -i '/org.gradle.caching/d' gradle.properties
          sed -i '/org.gradle.configuration-cache/d' gradle.properties

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Accept licenses
        run: yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: List installed SDK
        run: $ANDROID_HOME/tools/bin/sdkmanager --list --verbose 2>&1 | head -50

      - name: Install SDK components
        run: |
          $ANDROID_HOME/tools/bin/sdkmanager --install "platforms;android-37" 2>&1 || echo "android-37 not available"
          $ANDROID_HOME/tools/bin/sdkmanager --install "build-tools;37.0.0" 2>&1 || echo "build-tools 37 not available"

      - name: List installed platforms
        run: $ANDROID_HOME/tools/bin/sdkmanager --list --installed 2>&1 | grep -E "platforms|build-tools" || true

      - name: Build Debug APK
        run: ./gradlew assembleGplayDebug --stacktrace --no-daemon 2>&1

      - name: List output files
        if: success()
        run: |
          echo "=== APK output tree ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found"
          echo "=== Full output tree ==="
          find app/build/outputs -type f 2>/dev/null | head -50 || echo "No output files"
          echo "=== Check build/intermediates ==="
          ls -la app/build/intermediates/apk/ 2>/dev/null || echo "No intermediates/apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: zenobia-debug-apk
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/apk/*.apk
